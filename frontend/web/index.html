<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Circe — monitoreo inteligente de signos vitales en tiempo real, con alertas y recomendaciones de IA.">
  <meta name="theme-color" content="#9E8FE0">

  <!-- Open Graph -->
  <meta property="og:title" content="Circe · Monitoreo biomédico inteligente">
  <meta property="og:description" content="Supervisa frecuencia cardíaca, oxígeno y temperatura en tiempo real. Alertas y recomendaciones con IA.">
  <meta property="og:type" content="website">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Circe">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Circe · Monitoreo biomédico</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; background: #F7F5EE; }
    #circe-splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      background: radial-gradient(circle at 50% 40%, #fbfaf4 0%, #eef0ff 55%, #f3e9f5 100%);
      transition: opacity .5s ease; font-family: system-ui, sans-serif;
    }
    #circe-splash img { width: 110px; height: 110px; border-radius: 28px;
      box-shadow: 0 18px 50px rgba(158,143,224,.35); animation: floaty 1.8s ease-in-out infinite; }
    #circe-splash .name { margin-top: 22px; font-size: 26px; font-weight: 700;
      letter-spacing: .5px;
      background: linear-gradient(90deg,#3FB7A6,#5BA8E0,#9E8FE0,#DB6FA8);
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    #circe-splash .tag { margin-top: 6px; color: #8794A6; font-size: 13px; }
    .bar { margin-top: 22px; width: 120px; height: 4px; border-radius: 4px;
      background: #e7e2f2; overflow: hidden; }
    .bar i { display:block; height:100%; width:40%; border-radius:4px;
      background: linear-gradient(90deg,#3FB7A6,#9E8FE0,#DB6FA8);
      animation: slide 1.1s ease-in-out infinite; }
    @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes slide { 0%{transform:translateX(-120%)} 100%{transform:translateX(320%)} }
  </style>
</head>
<body>
  <div id="circe-splash">
    <img src="icons/Icon-192.png" alt="Circe">
    <div class="name">Circe</div>
    <div class="tag">Tu salud, guiada con cuidado</div>
    <div class="bar"><i></i></div>
  </div>
  <script>
    // Limpia cualquier service worker antiguo y sus cachés (evita que se sirvan
    // assets viejos como la fuente de iconos recortada). La app no usa SW.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (rs) {
        rs.forEach(function (r) { r.unregister(); });
      }).catch(function () {});
      if (window.caches && caches.keys) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        }).catch(function () {});
      }
    }
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('circe-splash');
      if (s) { s.style.opacity = '0'; setTimeout(function(){ s.remove(); }, 500); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
