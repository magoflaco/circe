name: Build and Release Circe APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x' # Uses Dart 3.4.x which satisfies ^3.4.0
          channel: 'stable'

      - name: Install Dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Build APK
        working-directory: ./frontend
        run: flutter build apk --release

      - name: Generate Release Notes
        id: release_notes
        run: |
          echo '## Circe v1.0.1 Release' > release_notes.md
          echo '' >> release_notes.md
          echo 'Welcome to the official release of **Circe: Automation of Vital Signs Monitoring**! 🎉' >> release_notes.md
          echo '' >> release_notes.md
          echo 'You can also test the application and the web interface directly at: **[https://monitor.itb.lat/](https://monitor.itb.lat/)**' >> release_notes.md
          echo '' >> release_notes.md
          echo '### 📱 Mobile App Features:' >> release_notes.md
          echo '- **Real-Time Dashboard**: Monitor live heart rate, SpO₂, and body temperature seamlessly synced from the ESP32.' >> release_notes.md
          echo '- **AI Health Analysis**: Advanced analysis and summaries powered by Groq.' >> release_notes.md
          echo '- **Device Management**: Easily pair and configure your Circe hardware device settings directly from the app.' >> release_notes.md
          echo '- **Emergency Contacts**: Manage caregivers and family members who should receive SMS alerts in case of anomalies.' >> release_notes.md
          echo '- **Push Notifications**: Receive instant alerts on your phone whenever critical physiological thresholds are exceeded.' >> release_notes.md
          echo '- **Activity & History**: Browse historical records and visual charts of previous measurements to track health trends over time.' >> release_notes.md
          echo '- **Secure Authentication**: Complete flow including Login, Registration, OTP Verification, and Password Recovery.' >> release_notes.md
          echo '' >> release_notes.md
          echo '### 🛠 System Components Included:' >> release_notes.md
          echo '- **Flutter Frontend App**: The comprehensive cross-platform app (APK attached below).' >> release_notes.md
          echo '- **FastAPI Backend**: Real-time APIs, secure JWT auth, and Groq integration.' >> release_notes.md
          echo '- **ESP32 Firmware**: The C++ code to operate the MAX30102, MLX90614, and SIM800L for independent SMS alerting.' >> release_notes.md
          echo '' >> release_notes.md
          echo '### 📥 Installation:' >> release_notes.md
          echo 'Download `app-release.apk` below and install it on your Android device. Please consult the `README.md` for instructions on setting up the backend server and flashing the firmware.' >> release_notes.md

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          files: frontend/build/app/outputs/flutter-apk/app-release.apk
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
